services:
  postgres:
    image: postgres:17-alpine
    container_name: safecheck-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-safecheck}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-safecheck}
      POSTGRES_DB: ${POSTGRES_DB:-safecheck}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - safecheck-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-safecheck} -d ${POSTGRES_DB:-safecheck}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: safecheck-app
    restart: unless-stopped
    command: sh -c "npx prisma migrate deploy && npx prisma generate && npx next dev --webpack -H 0.0.0.0"
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-safecheck}:${POSTGRES_PASSWORD:-safecheck}@postgres:5432/${POSTGRES_DB:-safecheck}?schema=public
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  safecheck-pgdata:
